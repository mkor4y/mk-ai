<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bağlantı Hatası - MK AI</title>
    <style>
        body {
            background-color: #0f1629;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #162036;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        p { color: rgba(248, 250, 252, 0.7); margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚠️ Sunucuya Bağlanılamadı</h2>
        <p>Lütfen sunucu adresini (IP) girin:<br><small>(Örn: http://192.168.1.35:3000)</small></p>
        <input type="text" id="serverUrl" placeholder="http://localhost:3000" value="http://localhost:3000">
        <button onclick="connect()">Bağlan</button>
    </div>
    <script>
        function connect() {
            const url = document.getElementById('serverUrl').value;
            if (url) {
                window.electron.setServerUrl(url);
            }
        }
    </script>
</body>
</html>
