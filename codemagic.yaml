# Codemagic CI/CD Configuration — MK AI Mobile
# https://docs.codemagic.io/yaml/yaml-getting-started/
#
# IKI workflow var:
#   1) ios-unsigned   -> Imzasiz .ipa uret (Sideloadly ile yuklemek icin, ucretsiz Apple ID)
#   2) android        -> Imzasiz .apk uret
#
# Flutter proje koku: mobile/  (repo kokunde codemagic.yaml, working_directory ile cd ediyoruz)

workflows:
  # =========================================================================
  # iOS UNSIGNED IPA — Apple Developer hesabi gerektirmez
  # Sideloadly/AltStore ile iPhone'a yuklemek icin
  # =========================================================================
  ios-unsigned:
    name: iOS Unsigned IPA (Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mkoray.mkai"
        APP_NAME: "MK AI"
        # pubspec assets: .env — CI'da asagidaki script yazar (yerel .gitignore)
        API_BASE_URL: "https://m-koray.online/api"
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/mobile/ios/Pods

    scripts:
      - name: Flutter & Xcode versiyon kontrolu
        script: |
          flutter --version
          xcodebuild -version

      - name: Pub paketleri ve iOS config
        working_directory: mobile
        script: |
          set -euo pipefail
          # pubspec.yaml .env asset ister; clone'da yok (.gitignore)
          printf 'API_BASE_URL=%s\n' "${API_BASE_URL:-https://m-koray.online/api}" > .env
          flutter pub get
          # Podfile + Generated.xcconfig olusturur, tam build yapmaz
          flutter build ios --config-only --release --no-codesign

      - name: Pod install (imzasiz)
        working_directory: mobile/ios
        script: |
          set -euo pipefail
          chmod +x codemagic_pod_signing_off.sh
          bash ./codemagic_pod_signing_off.sh
          pod install --repo-update

      - name: Flutter iOS build (imzasiz, release)
        working_directory: mobile
        script: |
          set -euo pipefail
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM=""

          # Birincil: Flutter (imzasiz)
          if flutter build ios \
            --release \
            --no-codesign \
            --build-name=1.0.0 \
            --build-number=$(($BUILD_NUMBER + 1)); then
            echo "Flutter build basarili"
            exit 0
          fi

          echo "Flutter build team hatasi verdi; xcodebuild ile deneniyor..."
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$CM_BUILD_DIR/mobile/build/ios_derived" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

          APP_SRC="$CM_BUILD_DIR/mobile/build/ios_derived/Build/Products/Release-iphoneos/Runner.app"
          APP_DST="$CM_BUILD_DIR/mobile/build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_SRC" ]; then
            echo "HATA: Runner.app bulunamadi: $APP_SRC"
            exit 1
          fi
          mkdir -p "$(dirname "$APP_DST")"
          rm -rf "$APP_DST"
          cp -R "$APP_SRC" "$APP_DST"
          echo "xcodebuild ile Runner.app kopyalandi"

      - name: Imzasiz .ipa paketle (Sideloadly icin)
        script: |
          set -euo pipefail
          APP_DIR="$CM_BUILD_DIR/mobile/build/ios/iphoneos"
          if [ ! -d "$APP_DIR/Runner.app" ]; then
            echo "HATA: Runner.app bulunamadi: $APP_DIR"
            ls -la "$APP_DIR" || true
            exit 1
          fi
          cd "$CM_BUILD_DIR"
          rm -rf Payload MK_AI-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_DIR/Runner.app" Payload/
          zip -qr MK_AI-unsigned.ipa Payload
          rm -rf Payload
          echo "IPA boyutu:"
          ls -lh MK_AI-unsigned.ipa

    artifacts:
      - MK_AI-unsigned.ipa
      - mobile/build/ios/iphoneos/Runner.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    # E-posta bildirimi istiyorsan publishing blogunu ac; recipients bos olamaz.
    # publishing:
    #   email:
    #     recipients:
    #       - senin@email.com
    #     notify:
    #       success: true
    #       failure: true

  # =========================================================================
  # ANDROID UNSIGNED APK — Telefona dogrudan kurulabilir (Bilinmeyen Kaynaklar acik olmalı)
  # =========================================================================
  android-unsigned:
    name: Android Unsigned APK
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: stable
      vars:
        API_BASE_URL: "https://m-koray.online/api"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      - name: Flutter versiyon
        script: flutter --version

      - name: Pub paketleri
        working_directory: mobile
        script: |
          set -euo pipefail
          printf 'API_BASE_URL=%s\n' "${API_BASE_URL:-https://m-koray.online/api}" > .env
          flutter pub get

      - name: Android APK build (release, debug-imzali)
        working_directory: mobile
        script: |
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$(($BUILD_NUMBER + 1))

    artifacts:
      - mobile/build/app/outputs/flutter-apk/*.apk
